name: Build

on:
  push:
  pull_request:
  release:
    types:
      - published

jobs:
  test:
    runs-on: {% raw %}${{ matrix.os }}{% endraw %}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python_version: ['{{ cookiecutter.target_python_version }}']

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: {% raw %}${{ matrix.python_version }}{% endraw %}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch pre-commit
          hatch env create
      - name: Lint and typecheck
        run: |
          hatch run lint
          hatch run typecheck
      - name: Run Tests
        run: |
          hatch run cov-cicd
      - name: Build package
        run: |
          hatch build
      - uses: codecov/codecov-action@v5
        with:
          token: {% raw %}${{ secrets.CODECOV_TOKEN }}{% endraw %}
          slug: {{ cookiecutter.github_username }}/{{ cookiecutter.project_slug }}
          fail_ci_if_error: true
          verbose: true

  release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: release
    needs: test
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: {% raw %}${{ github.event.release.tag_name }}{% endraw %}
      - name: Set up Python {% raw %}${{ matrix.python_version }}{% endraw %}
        uses: actions/setup-python@v6
        with:
          python-version: '{{ cookiecutter.target_python_version }}'
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install hatch pre-commit
      - name: Build
        run: |
          hatch build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Upload release assets
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitDraftDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          artifacts: dist/*.whl,dist/*.tar.gz
          tag: {% raw %}${{ github.event.release.tag_name }}{% endraw %}
          token: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}
